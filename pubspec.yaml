name: ai_hairstyle_preview_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
    

  cupertino_icons: ^1.0.8

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.6

  google_generative_ai: ^0.4.7

  flutter_riverpod: ^2.6.1

  image_picker: ^1.1.2
  share_plus: ^10.1.1
  gal: ^2.3.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  path: ^1.9.0
  http: ^1.6.0
  intl: ^0.19.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/hairstyles/male/
    - assets/hairstyles/female/

 
